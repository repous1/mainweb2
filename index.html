<!DOCTYPE html>
<html lang="en">
<head>
  <script async defer src="https://tools.luckyorange.com/core/lo.js?site-id=204834ff"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IQ Insight | Professional Assessment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .green-custom { background-color: #00A86B; }
    .text-green-custom { color: #00A86B; }
    .border-green-custom { border-color: #00A86B; }
  </style>
</head>
<body class="bg-[#fafaf9] text-[#2C3345] font-sans">

  <header class="w-full bg-white/70 backdrop-blur-lg border-b border-gray-200 fixed z-50">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="text-2xl font-bold tracking-tighter">IQ INSIGHT</div>
      <a href="#test-section" class="px-6 py-2 rounded-xl green-custom text-white font-medium">Start Test</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 pt-32 pb-20">
    <section id="hero" class="flex flex-col items-center text-center mb-20">
      <h1 class="text-4xl lg:text-6xl font-extrabold mb-6">
        <span class="text-[#2C3345]">Want to Know Your</span><br/>
        <span class="text-blue-600">Real IQ Score?</span>
      </h1>
      <p class="text-lg text-gray-600 max-w-md mb-8">Take our 20-question IQ test and unlock your path to self-discovery and development.</p>
      <button onclick="document.getElementById('test-section').scrollIntoView({behavior: 'smooth'})" class="px-8 py-4 rounded-xl green-custom text-white text-lg font-bold hover:opacity-90 transition">Start IQ Test Now</button>
    </section>

    <section id="test-section" class="bg-white p-8 lg:p-12 rounded-3xl shadow-sm border border-gray-100">
      <div id="quizArea">
        <div class="w-full bg-gray-100 h-2 rounded-full mb-8 overflow-hidden">
          <div id="progress" class="h-full green-custom w-[5%] transition-all duration-500"></div>
        </div>
        <h2 id="qText" class="text-2xl font-bold mb-6">Loading...</h2>
        <div id="options" class="grid grid-cols-1 gap-4"></div>
      </div>
      
      <div id="resultArea" class="hidden text-center py-10">
        <h2 class="text-3xl font-bold mb-4">Assessment Complete</h2>
        <p id="scoreText" class="text-2xl font-bold text-green-custom mb-8"></p>
        
        <div class="max-w-sm mx-auto mb-8">
          <svg viewBox="0 0 200 100" class="w-full">
            <path d="M 0 100 C 50 100, 50 10, 100 10 C 150 10, 150 100, 200 100" fill="none" stroke="#CBD5E1" stroke-width="2"/>
            <path d="M 0 100 C 50 100, 50 10, 100 10 C 150 10, 150 100, 200 100" fill="#E2E8F0" opacity="0.5"/>
            <circle cx="100" cy="10" r="4" fill="#00A86B"/>
            <text x="100" y="5" font-size="8" text-anchor="middle" fill="#00A86B">Your Score</text>
          </svg>
        </div>
        
        <button onclick="location.reload()" class="px-6 py-3 rounded-xl bg-gray-100 font-medium hover:bg-gray-200">Restart Test</button>
      </div>
    </section>
  </main>

  <script>
    const QUESTIONS = [
      { q: "3, 6, 9, 12, ... What's next?", a: ["13", "15", "18"], correct: "15" },
      { q: "Dog is to Mammal, as Crocodile is to...", a: ["Bird", "Fish", "Reptile"], correct: "Reptile" },
      { q: "1, 2, 4, 8, 16, ... What's next?", a: ["24", "32", "64"], correct: "32" },
      { q: "Opposite of North is South. Opposite of East is...", a: ["West", "Right", "Left"], correct: "West" },
      { q: "10 - 2 * 3 = ?", a: ["4", "24", "8"], correct: "4" },
      { q: "Which is the odd one out?", a: ["Apple", "Banana", "Chair"], correct: "Chair" },
      { q: "0, 1, 1, 2, 3, 5, ... What's next?", a: ["6", "7", "8"], correct: "8" },
      { q: "Opposite of Day is Night. Opposite of Morning is...", a: ["Evening", "Late", "Day"], correct: "Evening" },
      { q: "3 squared is?", a: ["6", "9", "12"], correct: "9" },
      { q: "Which letter is the odd one out?", a: ["A", "E", "B"], correct: "B" },
      { q: "Plane is to Sky, as Ship is to...", a: ["Land", "Sea", "Space"], correct: "Sea" },
      { q: "Half of 50% is?", a: ["10%", "25%", "20%"], correct: "25%" },
      { q: "Parent is to Child. Uncle is to...", a: ["Niece/Nephew", "Brother", "Parent"], correct: "Niece/Nephew" },
      { q: "1 + 2 + 3 + 4 = ?", a: ["9", "10", "11"], correct: "10" },
      { q: "Opposite of Fast is Slow. Opposite of High is...", a: ["Low", "Narrow", "Far"], correct: "Low" },
      { q: "12 months is 1 year. 24 months is...", a: ["1 year", "2 years", "3 years"], correct: "2 years" },
      { q: "Which is the largest number?", a: ["0.9", "0.09", "0.99"], correct: "0.99" },
      { q: "Pen is to Write. Scissors is to...", a: ["Cut", "Glue", "Fold"], correct: "Cut" },
      { q: "15 minutes is what fraction of an hour?", a: ["1/2", "1/3", "1/4"], correct: "1/4" },
      { q: "1, 3, 5, 7, ... What's next?", a: ["8", "9", "11"], correct: "9" }
    ];

    let state = { index: 0, score: 0 };

    function render() {
      const q = QUESTIONS[state.index];
      document.getElementById('progress').style.width = ((state.index + 1) / QUESTIONS.length * 100) + '%';
      document.getElementById('qText').textContent = q.q;
      document.getElementById('options').innerHTML = q.a.map(opt => `
        <button onclick="check('${opt}')" class="p-4 border-2 border-gray-200 rounded-xl hover:border-green-500 hover:bg-green-50 text-left transition font-medium">
          ${opt}
        </button>
      `).join('');
    }

    function check(answer) {
      if (answer === QUESTIONS[state.index].correct) state.score++;
      state.index++;
      if (state.index < QUESTIONS.length) {
        render();
      } else {
        document.getElementById('quizArea').classList.add('hidden');
        document.getElementById('resultArea').classList.remove('hidden');
        document.getElementById('scoreText').textContent = `Your Final Score: ${state.score} / ${QUESTIONS.length}`;
      }
    }
    render();
  </script>
</body>
</html>
